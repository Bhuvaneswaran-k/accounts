<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeFashion — Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --navy:#0f172a;--navy2:#1e293b;--accent:#6366f1;--accent-hover:#4f46e5;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --bg:#f1f5f9;--card:#ffffff;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;--sw:256px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;font-weight:700}

/* ─── Sidebar ─────────────────────────── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--navy);display:flex;flex-direction:column;z-index:100;transition:transform .25s;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.logo-wrap{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-inner{display:flex;align-items:center;gap:11px}
.logo-box{width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;letter-spacing:-.02em;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.03em;line-height:1}
.logo-tag{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.nav-group-label{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.18);letter-spacing:.1em;text-transform:uppercase;padding:14px 18px 4px}
.snav{padding:6px 8px;flex:1;overflow-y:auto;scrollbar-width:none}
.snav::-webkit-scrollbar{display:none}
button.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:1px;user-select:none;width:100%;text-align:left;background:none;border:none;font-family:'Inter',sans-serif;position:relative}
button.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
button.nav-item.active{background:rgba(99,102,241,.2);color:#a5b4fc}
button.nav-item.active .ni{stroke:#a5b4fc}
.ni{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;flex-shrink:0}
.nav-badge{position:absolute;right:10px;background:#ef4444;color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px}
.sidebar-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06)}
.user-pill{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.05)}
.user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a5b4fc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:rgba(255,255,255,.35)}

/* ─── Topbar ──────────────────────────── */
.main{margin-left:var(--sw);min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.page-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s}
.sync-chip:hover{background:var(--border)}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot-ok{background:#10b981}.sdot-sync{background:#f59e0b;animation:pulse .8s infinite}.sdot-err{background:#ef4444}.sdot-idle{background:#94a3b8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ─── Content ─────────────────────────── */
.content{padding:22px 24px;max-width:1400px}

/* ─── Buttons ─────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;line-height:1;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(99,102,241,.3)}.btn-primary:hover{background:var(--accent-hover)}
.btn-outline{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--bg)}
.btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.btn-danger:hover{background:#fecaca}
.btn-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}.btn-success:hover{background:#a7f3d0}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid transparent}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

/* ─── Metric cards ────────────────────── */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:default}
.metric-card.clickable{cursor:pointer;transition:all .15s}.metric-card.clickable:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.mc-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.mc-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mc-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);line-height:1;margin-bottom:6px}
.mc-sub{font-size:11.5px;color:var(--text3)}
.mc-trend{font-size:11px;font-weight:500}
.trend-up{color:#10b981}.trend-dn{color:#ef4444}.trend-neu{color:var(--text3)}

/* ─── Cards ───────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:1px}

/* ─── Table ───────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;padding:9px 13px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
th.sc{cursor:pointer;user-select:none;transition:color .15s}.th.sc:hover{color:var(--accent)}
td{padding:11px 13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
tr.overdue td{background:#fff8f8}

/* ─── Filter bar ──────────────────────── */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--border);align-items:center;background:#fafbfd}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-family:'Inter',sans-serif;color:var(--text);outline:none;background:var(--card);height:33px;transition:border-color .15s}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}

/* ─── Totals strip ────────────────────── */
.totals-strip{display:flex;gap:16px;padding:9px 14px;background:#f8fafc;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.ts-item{display:flex;align-items:center;gap:6px;font-size:12.5px}
.ts-label{color:var(--text3);font-weight:500}
.ts-val{font-weight:600;font-family:'Syne',sans-serif;font-size:13px}

/* ─── Badges ──────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.01em}
.b-green{background:#d1fae5;color:#065f46}
.b-blue{background:#dbeafe;color:#1e40af}
.b-amber{background:#fef3c7;color:#92400e}
.b-red{background:#fee2e2;color:#991b1b}
.b-gray{background:#f1f5f9;color:#475569}
.b-indigo{background:#e0e7ff;color:#3730a3}
.b-purple{background:#ede9fe;color:#5b21b6}

/* ─── Modal ───────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:18px 18px 0 0}
.modal-header h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.modal-body{padding:18px 22px 22px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color .15s;background:var(--card)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:56px}
.fg .err{color:#dc2626;font-size:11px}
.fg input[readonly]{background:#f8fafc;color:var(--text3)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.form-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ─── GST section ─────────────────────── */
.gst-toggle{display:flex;background:#f1f5f9;border-radius:9px;padding:3px;width:fit-content}
.gst-toggle label{padding:6px 16px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text3);transition:all .15s;user-select:none}
.gst-toggle input{display:none}
.gst-toggle input:checked+label{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.gst-area{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:13px 15px;margin:9px 0}
.gst-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.gst-total{background:#e0f2fe;border-radius:8px;padding:9px 13px;display:flex;justify-content:space-between;align-items:center;margin-top:9px}

/* ─── Upload area ─────────────────────── */
.upload-area{border:2px dashed var(--border2);border-radius:9px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:#fafbfc}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:#f0f0ff}
.upload-area.filled{border-style:solid;border-color:#6ee7b7;background:#f0fdf4}
.upload-prev{max-width:100%;max-height:120px;border-radius:7px;object-fit:contain}

/* ─── Toast ───────────────────────────── */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:400}
.toast{background:var(--navy2);color:#fff;padding:11px 16px;border-radius:11px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;animation:slideUp .2s ease;max-width:290px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.success{background:#059669}.toast.error{background:#dc2626}.toast.warn{background:#d97706}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ─── Confirm dialog ──────────────────── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.confirm-card{background:var(--card);border-radius:16px;padding:24px;width:320px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.confirm-card h4{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:7px}
.confirm-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.confirm-acts{display:flex;gap:8px;justify-content:flex-end}

/* ─── Login ───────────────────────────── */
.login-page{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border-radius:20px;padding:34px;width:380px;box-shadow:0 25px 60px rgba(0,0,0,.5)}

/* ─── Sections ────────────────────────── */
.section-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:16px}
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}

/* ─── Reports ─────────────────────────── */
.report-tabs{display:flex;gap:0;background:#f1f5f9;border-radius:10px;padding:3px;width:fit-content;margin-bottom:18px}
.report-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:none;font-family:'Inter',sans-serif}
.report-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pl-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:9px 14px;border-radius:8px;font-size:13.5px;align-items:center}
.pl-row.section-head{background:var(--bg);font-weight:600;font-family:'Syne',sans-serif;margin-top:6px}
.pl-row.total{border-top:2px solid var(--border);font-weight:700;font-family:'Syne',sans-serif;font-size:15px;margin-top:4px;padding-top:12px}
.pl-row.subtotal{border-top:1px solid var(--border);font-weight:600;color:var(--text2);margin-top:2px}
.pl-row.indent{padding-left:26px;color:var(--text2)}
.pl-amt{text-align:right;font-family:'Syne',sans-serif;font-size:13px;font-weight:600}

/* ─── Party ledger ────────────────────── */
.party-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.party-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md)}
.party-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.party-info{flex:1;min-width:0}
.party-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.party-meta{font-size:11.5px;color:var(--text3);margin-top:2px}

/* ─── Empty state ─────────────────────── */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:14px;opacity:.4}
.empty h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px}
.empty p{font-size:13px;color:var(--text3);margin-bottom:16px}

/* ─── Settings sections ───────────────── */
.ss{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow)}
.ss-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px}
.ss-sub{font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.55}

/* ─── Misc ────────────────────────────── */
.c-green{color:#059669;font-weight:600}.c-red{color:#dc2626;font-weight:600}.c-purple{color:#7c3aed;font-weight:600}
.linka{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;text-decoration:underline;padding:0;font-family:'Inter',sans-serif}
.info-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:9px;padding:10px 13px;font-size:12.5px;color:#0369a1;line-height:1.6;margin-top:8px}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:10px 13px;font-size:12.5px;color:#92400e;line-height:1.6;margin-top:8px}
.pager{display:flex;align-items:center;gap:4px;padding:11px 14px;justify-content:flex-end;border-top:1px solid var(--border)}
.pb{padding:5px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;background:var(--card);font-family:'Inter',sans-serif;color:var(--text);transition:all .1s}
.pb.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.pb:disabled{opacity:.35;cursor:default}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text);align-items:center}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}.ovl.open{display:block}
.due-over{color:#991b1b;font-size:11.5px;font-weight:500}
.due-warn{color:#92400e;font-size:11.5px;font-weight:500}
.due-ok{color:var(--text3);font-size:11.5px}
.fb-setup{background:linear-gradient(135deg,#f0f0ff,#e0e7ff);border:1px solid #c7d2fe;border-radius:14px;padding:20px 22px;margin-bottom:16px}
.fb-setup h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#3730a3;margin-bottom:4px}
.fb-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px;line-height:1.55}
.fb-step-num{width:22px;height:22px;border-radius:50%;background:#6366f1;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
code.pill{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);border-radius:5px;padding:1px 6px;font-family:monospace;font-size:11.5px;color:#4338ca}
@media(max-width:960px){
  .sidebar{transform:translateX(-256px)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}
  .metric-grid{grid-template-columns:1fr 1fr}.fgrid{grid-template-columns:1fr}.gst-row{grid-template-columns:1fr 1fr}
  .topbar{padding:0 14px}.content{padding:14px}.hamburger{display:flex!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ══ CONSTANTS ════════════════════════════════ */
const CATS=['Sales','Commission','Salary','Rent','Raw Material','Utilities','Tax','Maintenance','Transport','Other'];
const PMETHODS=['Cash','Bank Transfer','UPI','Cheque'];
const TYPES=['Income','Expense','Payment'];
const STATS=['Paid','Pending','Cancelled'];
const GST_TYPES=['GST Bill','Non-GST Bill'];
const GST_RATES=[0,5,12,18,28];
const CREDS_KEY='wf_creds';
const FB_KEY='wf_fb_cfg';
const CACHE_KEY='wf_cache';
const IMGS_KEY='wf_imgs';
const DEF_CREDS={u:'admin',p:'WeFashion@2024'};

/* ══ UTILS ════════════════════════════════════ */
const genId=()=>'WF'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,3).toUpperCase();
const today=()=>new Date().toISOString().split('T')[0];

/* ══ FIREBASE ═════════════════════════════════ */
let fbApp=null,fbDb=null,fbRef=null,fbListener=null;

const initFB=(cfg)=>{
  try{
    if(fbApp){try{fbApp.delete();}catch{}}
    fbApp=firebase.initializeApp(cfg,'wefashion_'+Date.now());
    fbDb=firebase.database(fbApp);
    return true;
  }catch(e){console.error('FB init',e);return false;}
};

const fbWrite=async(txns)=>{
  if(!fbDb)return false;
  try{
    const obj={};
    txns.forEach(t=>{obj[t.id]={...t};});
    await fbDb.ref('wefashion/transactions').set(obj);
    return true;
  }catch(e){console.error('FB write',e);return false;}
};

const fbListen=(callback)=>{
  if(!fbDb)return null;
  const ref=fbDb.ref('wefashion/transactions');
  ref.on('value',snap=>{
    const val=snap.val();
    if(val){
      const arr=Object.values(val).filter(Boolean);
      arr.sort((a,b)=>b.timestamp>a.timestamp?1:-1);
      callback(arr);
    } else {callback([]);}
  });
  return ()=>ref.off('value');
};

/* ══ CHART COMPONENTS ═════════════════════════ */
function BarChart({data}){
  const r=useRef(),c=useRef();
  useEffect(()=>{
    if(!r.current)return;
    if(c.current)c.current.destroy();
    c.current=new Chart(r.current,{type:'bar',data:{labels:data.labels,datasets:[
      {label:'Income',data:data.income,backgroundColor:'rgba(99,102,241,.75)',borderRadius:6,borderSkipped:false},
      {label:'Expense',data:data.expense,backgroundColor:'rgba(239,68,68,.6)',borderRadius:6,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},boxWidth:10,padding:12}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Inter',size:11}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{family:'Inter',size:11},callback:v=>'₹'+(v>=100000?Math.round(v/100000)+'L':v>=1000?Math.round(v/1000)+'K':v)}}}}});
    return()=>{if(c.current)c.current.destroy();};
  },[JSON.stringify(data)]);
  return React.createElement('canvas',{ref:r});
}

function DChart({data}){
  const r=useRef(),c=useRef();
  useEffect(()=>{
    if(!r.current||!data.labels.length)return;
    if(c.current)c.current.destroy();
    c.current=new Chart(r.current,{type:'doughnut',data:{labels:data.labels,datasets:[{data:data.values,backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},boxWidth:10,padding:8}},tooltip:{callbacks:{label:ctx=>' ₹'+Number(ctx.raw).toLocaleString('en-IN')}}}}});
    return()=>{if(c.current)c.current.destroy();};
  },[JSON.stringify(data)]);
  return React.createElement('canvas',{ref:r});
}

function LineChart({data}){
  const r=useRef(),c=useRef();
  useEffect(()=>{
    if(!r.current)return;
    if(c.current)c.current.destroy();
    c.current=new Chart(r.current,{type:'line',data:{labels:data.labels,datasets:[{label:'Net Cash Flow',data:data.values,borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.08)',fill:true,tension:.4,borderWidth:2,pointBackgroundColor:'#6366f1',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'Inter',size:11}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{family:'Inter',size:11},callback:v=>'₹'+(v>=100000?Math.round(v/100000)+'L':v>=1000?Math.round(v/1000)+'K':v)}}}}});
    return()=>{if(c.current)c.current.destroy();};
  },[JSON.stringify(data)]);
  return React.createElement('canvas',{ref:r});
}

const TB=({t})=><span className={'badge '+(t==='Income'?'b-green':t==='Expense'?'b-red':'b-purple')}>{t}</span>;

const GB=({g})=><span className={'badge '+(g==='GST Bill'?'b-indigo':'b-gray')}>{g==='GST Bill'?'GST':'Non-GST'}</span>;

function DueLabel({d,s}){
  if(!d||s==='Paid'||s==='Cancelled')return <span className="due-ok">—</span>;
  const dl=daysLeft(d);
  if(dl<0)return <span className="due-over">⚠ {Math.abs(dl)}d overdue</span>;
  if(dl<=5)return <span className="due-warn">⏳ {dl}d left</span>;
  return <span className="due-ok">{d}</span>;
}

/* ══ TRANSACTION MODAL ════════════════════════ */
function TxModal({tx,onSave,onClose}){
  const init={
    date:tx?.date||today(),type:tx?.type||'Expense',category:tx?.category||'Other',
    vendor:tx?.vendor||'',vendorGstin:tx?.vendorGstin||'',description:tx?.description||'',
    paymentMethod:tx?.paymentMethod||'Bank Transfer',referenceNo:tx?.referenceNo||'',
    proofLink:tx?.proofLink||'',status:tx?.status||'Paid',dueDate:tx?.dueDate||'',
    gstType:tx?.gstType||'Non-GST Bill',gstRate:tx?.gstRate||18,
    taxableAmount:tx?.taxableAmount||'',gstAmount:tx?.gstAmount||0,amount:tx?.amount||''
  };
  const [f,sf]=useState(init);
  const [errs,se]=useState({});
  const [img,simg]=useState(null);
  const set=(k,v)=>sf(p=>({...p,[k]:v}));

  useEffect(()=>{if(tx?.id){const imgs=loadImgs();if(imgs[tx.id])simg(imgs[tx.id]);};},[]);

  const calc=(ta,rate,gt)=>{
    if(gt==='GST Bill'&&ta&&Number(ta)>0){const g=Math.round(Number(ta)*rate/100);return{gstAmount:g,amount:Number(ta)+g};}
    return{gstAmount:0,amount:Number(ta)||0};
  };
  const onTA=v=>{const r=calc(v,f.gstRate,f.gstType);sf(p=>({...p,taxableAmount:v,...r}));};
  const onRate=v=>{const r=calc(f.taxableAmount,Number(v),f.gstType);sf(p=>({...p,gstRate:Number(v),...r}));};
  const onGT=v=>{const r=calc(f.taxableAmount,f.gstRate,v);sf(p=>({...p,gstType:v,...r}));};

  const handleImg=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>2097152){alert('Image must be under 2MB');return;}
    const rd=new FileReader();rd.onload=ev=>simg(ev.target.result);rd.readAsDataURL(file);
  };

  const validate=()=>{
    const e={};
    if(!f.date)e.date='Required';
    if(!f.vendor.trim())e.vendor='Required';
    if(!f.taxableAmount||Number(f.taxableAmount)<=0)e.ta='Enter a valid amount';
    se(e);return !Object.keys(e).length;
  };

  const submit=()=>{if(validate())onSave({...f,taxableAmount:Number(f.taxableAmount),gstAmount:Number(f.gstAmount),amount:Number(f.amount)},img);};

  const isGst=f.gstType==='GST Bill';

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{tx?'Edit Transaction':'Add Transaction'}</h3>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕ Close</button>
        </div>
        <div className="modal-body">
          <div className="fgrid">
            <div className="fg"><label>Date *</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/>{errs.date&&<span className="err">{errs.date}</span>}</div>
            <div className="fg"><label>Type</label><select value={f.type} onChange={e=>set('type',e.target.value)}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
            <div className="fg"><label>Category</label><select value={f.category} onChange={e=>set('category',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="fg"><label>Status</label><select value={f.status} onChange={e=>set('status',e.target.value)}>{STATS.map(s=><option key={s}>{s}</option>)}</select></div>
            {f.status==='Pending'&&<div className="fg full"><label>Due Date</label><input type="date" value={f.dueDate} onChange={e=>set('dueDate',e.target.value)}/></div>}
            <div className="fg full"><label>Vendor / Party Name *</label><input value={f.vendor} onChange={e=>set('vendor',e.target.value)} placeholder="e.g. Kovai Cotton Mills"/>{errs.vendor&&<span className="err">{errs.vendor}</span>}</div>
            <div className="fg full"><label>Vendor GSTIN</label><input value={f.vendorGstin} onChange={e=>set('vendorGstin',e.target.value)} placeholder="33AABCT1234F1ZK" style={{fontFamily:'monospace',letterSpacing:'.04em'}}/></div>
          </div>

          <div style={{margin:'14px 0 6px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:7}}>Bill Type</div>
            <div className="gst-toggle">
              {GST_TYPES.map(g=>(
                <React.Fragment key={g}>
                  <input type="radio" name="gst_r" id={'gst_r_'+g.replace(' ','_')} value={g} checked={f.gstType===g} onChange={()=>onGT(g)}/>
                  <label htmlFor={'gst_r_'+g.replace(' ','_')}>{g}</label>
                </React.Fragment>
              ))}
            </div>
          </div>

          <div className="gst-area">
            <div className="gst-row">
              <div className="fg">
                <label>{isGst?'Base Amount (excl. GST) *':'Amount ₹ *'}</label>
                <input type="number" min="0.01" step="0.01" value={f.taxableAmount} onChange={e=>onTA(e.target.value)} placeholder="0.00"/>
                {errs.ta&&<span className="err">{errs.ta}</span>}
              </div>
              {isGst&&<div className="fg"><label>GST Rate</label><select value={f.gstRate} onChange={e=>onRate(e.target.value)}>{GST_RATES.map(r=><option key={r} value={r}>{r}%</option>)}</select></div>}
              {isGst&&<div className="fg"><label>GST Amount ₹</label><input readOnly value={f.gstAmount||''} placeholder="Auto-calculated"/></div>}
            </div>
            {isGst&&Number(f.taxableAmount)>0&&(
              <div className="gst-total">
                <span style={{fontSize:12.5,color:'#0369a1'}}>Base {fmtINR(f.taxableAmount)} + GST @{f.gstRate}% = {fmtINR(f.gstAmount)}</span>
                <span style={{fontFamily:'Syne',fontWeight:700,color:'#0c4a6e',fontSize:16}}>Total: {fmtINR(f.amount)}</span>
              </div>
            )}
          </div>

          <div className="fgrid" style={{marginTop:12}}>
            <div className="fg"><label>Payment Method</label><select value={f.paymentMethod} onChange={e=>set('paymentMethod',e.target.value)}>{PMETHODS.map(m=><option key={m}>{m}</option>)}</select></div>
            <div className="fg"><label>Reference / Cheque No.</label><input value={f.referenceNo} onChange={e=>set('referenceNo',e.target.value)} placeholder="NEFT ref / Cheque no."/></div>
            <div className="fg full">
              <label>Upload Receipt / Invoice</label>
              <div className={'upload-area '+(img?'filled':'')} onClick={()=>document.getElementById('img_file_inp').click()}>
                {img?<div><img src={img} className="upload-prev" alt="proof"/><div style={{fontSize:11.5,color:'#059669',marginTop:6}}>✓ Image attached — click to change</div></div>
                :<div style={{padding:'8px 0'}}><div style={{fontSize:28,marginBottom:6}}>📎</div><div style={{fontSize:13,fontWeight:500,color:'var(--text3)'}}>Click to upload receipt or invoice</div><div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>JPG · PNG · max 2MB · stored on this device</div></div>}
              </div>
              <input id="img_file_inp" type="file" accept="image/*" style={{display:'none'}} onChange={handleImg}/>
              {img&&<button className="btn btn-xs btn-danger" style={{marginTop:5,width:'fit-content'}} onClick={()=>simg(null)}>✕ Remove</button>}
            </div>
            <div className="fg full"><label>Payment Proof Link (Google Drive)</label><input value={f.proofLink} onChange={e=>set('proofLink',e.target.value)} placeholder="Paste shareable Google Drive link (syncs everywhere)"/></div>
            <div className="fg full"><label>Description / Remarks</label><textarea value={f.description} onChange={e=>set('description',e.target.value)} placeholder="Additional notes about this transaction..."/></div>
          </div>

          <div className="info-box">📌 Images upload are stored on this device. For cross-device proof access, upload to Google Drive and paste the link above — it syncs to all devices.</div>
          <div className="form-foot">
            <button className="btn btn-outline" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={submit}>{tx?'Update Transaction':'Add Transaction'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ DASHBOARD ════════════════════════════════ */
function Dashboard({txns,user,onAdd,onViewPending,notify}){
  const m=useMemo(()=>{
    const ok=t=>t.status!=='Cancelled';
    const inc=txns.filter(t=>t.type==='Income'&&ok(t)).reduce((s,t)=>s+t.amount,0);
    const exp=txns.filter(t=>t.type==='Expense'&&ok(t)).reduce((s,t)=>s+t.amount,0);
    const pmt=txns.filter(t=>t.type==='Payment'&&ok(t)).reduce((s,t)=>s+t.amount,0);
    const pend=txns.filter(t=>t.status==='Pending');
    const over=pend.filter(t=>t.dueDate&&daysLeft(t.dueDate)<0);
    const gstOut=txns.filter(t=>t.type==='Income'&&ok(t)&&t.gstType==='GST Bill').reduce((s,t)=>s+t.gstAmount,0);
    const gstIn=txns.filter(t=>t.type==='Expense'&&ok(t)&&t.gstType==='GST Bill').reduce((s,t)=>s+t.gstAmount,0);
    const commInc=txns.filter(t=>t.category==='Commission'&&t.type==='Income'&&ok(t)).reduce((s,t)=>s+t.amount,0);
    const commExp=txns.filter(t=>t.category==='Commission'&&t.type==='Expense'&&ok(t)).reduce((s,t)=>s+t.amount,0);
    const thisMon=new Date().toISOString().substring(0,7);
    const monInc=txns.filter(t=>t.type==='Income'&&ok(t)&&t.date.startsWith(thisMon)).reduce((s,t)=>s+t.amount,0);
    const monExp=txns.filter(t=>t.type==='Expense'&&ok(t)&&t.date.startsWith(thisMon)).reduce((s,t)=>s+t.amount,0);
    return{inc,exp,pmt,bal:inc-exp-pmt,pendCnt:pend.length,pendAmt:pend.reduce((s,t)=>s+t.amount,0),overCnt:over.length,overAmt:over.reduce((s,t)=>s+t.amount,0),gstOut,gstIn,gstNet:gstOut-gstIn,commInc,commExp,monInc,monExp};
  },[txns]);

  const barD=useMemo(()=>{
    const now=new Date();
    const months=Array.from({length:6},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);return{label:d.toLocaleString('default',{month:'short'}),key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};});
    return{labels:months.map(m=>m.label),income:months.map(m=>txns.filter(t=>t.type==='Income'&&t.date.startsWith(m.key)&&t.status!=='Cancelled').reduce((s,t)=>s+t.amount,0)),expense:months.map(m=>txns.filter(t=>t.type==='Expense'&&t.date.startsWith(m.key)&&t.status!=='Cancelled').reduce((s,t)=>s+t.amount,0))};
  },[txns]);

  const pieD=useMemo(()=>{
    const cats={};
    txns.filter(t=>t.type==='Expense'&&t.status!=='Cancelled').forEach(t=>{cats[t.category]=(cats[t.category]||0)+t.taxableAmount;});
    const e=Object.entries(cats).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
    return{labels:e.map(x=>x[0]),values:e.map(x=>x[1])};
  },[txns]);

  const lineD=useMemo(()=>{
    const now=new Date();
    const months=Array.from({length:6},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);return{label:d.toLocaleString('default',{month:'short'}),key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};});
    return{labels:months.map(m=>m.label),values:months.map(m=>{const inc=txns.filter(t=>t.type==='Income'&&t.date.startsWith(m.key)&&t.status!=='Cancelled').reduce((s,t)=>s+t.amount,0);const exp=txns.filter(t=>t.type==='Expense'&&t.date.startsWith(m.key)&&t.status!=='Cancelled').reduce((s,t)=>s+t.amount,0);return inc-exp;})};
  },[txns]);

  const recent=useMemo(()=>[...txns].sort((a,b)=>b.timestamp>a.timestamp?1:-1).slice(0,8),[txns]);

  if(!txns.length)return(
    <div>
      {user&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><div className="section-title">Dashboard</div><div className="section-sub">Welcome to WeFashion Finance</div></div>
        <button className="btn btn-primary" onClick={onAdd}>+ Add First Transaction</button>
      </div>}
      <div className="card"><div className="empty"><div className="empty-icon">📊</div><h3>No financial records yet</h3><p>Start by adding your first income or expense transaction.</p>{user&&<button className="btn btn-primary" onClick={onAdd}>+ Add Transaction</button>}</div></div>
    </div>
  );

  return(
    <div>
      {m.overCnt>0&&<div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:12,padding:'12px 18px',marginBottom:18,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:'#991b1b',fontWeight:500}}>⚠ {m.overCnt} overdue payment{m.overCnt>1?'s':''} totalling {fmtINR(m.overAmt)}</span>
        <button className="btn btn-danger btn-sm" onClick={onViewPending}>View Now</button>
      </div>}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}}>
        <div><div className="section-title">Dashboard</div><div className="section-sub">Financial overview — {new Date().toLocaleString('default',{month:'long',year:'numeric'})}</div></div>
        {user&&<button className="btn btn-primary" onClick={onAdd}><svg style={{width:14,height:14,stroke:'#fff',fill:'none',strokeWidth:2}} viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>Add Transaction</button>}
      </div>

      <div className="metric-grid">
        <div className="metric-card"><div className="mc-accent" style={{background:'#10b981'}}></div><div className="mc-label">Total Revenue<div className="mc-icon" style={{background:'#d1fae5'}}><span style={{fontSize:14}}>💰</span></div></div><div className="mc-val" style={{color:'#065f46'}}>{fmtINR(m.inc)}</div><div className="mc-sub">This month: {fmtINR(m.monInc)}</div></div>
        <div className="metric-card"><div className="mc-accent" style={{background:'#ef4444'}}></div><div className="mc-label">Total Expenses<div className="mc-icon" style={{background:'#fee2e2'}}><span style={{fontSize:14}}>📉</span></div></div><div className="mc-val" style={{color:'#991b1b'}}>{fmtINR(m.exp+m.pmt)}</div><div className="mc-sub">This month: {fmtINR(m.monExp)}</div></div>
        <div className="metric-card"><div className="mc-accent" style={{background:m.bal>=0?'#6366f1':'#ef4444'}}></div><div className="mc-label">Net Balance<div className="mc-icon" style={{background:'#e0e7ff'}}><span style={{fontSize:14}}>⚖️</span></div></div><div className="mc-val" style={{color:m.bal>=0?'#3730a3':'#991b1b'}}>{fmtINR(Math.abs(m.bal))}</div><div className="mc-sub" style={{color:m.bal>=0?'#059669':'#dc2626'}}>{m.bal>=0?'▲ Surplus':'▼ Deficit'}</div></div>
        <div className="metric-card clickable" onClick={onViewPending}><div className="mc-accent" style={{background:'#f59e0b'}}></div><div className="mc-label">Pending Payments<div className="mc-icon" style={{background:'#fef3c7'}}><span style={{fontSize:14}}>⏳</span></div></div><div className="mc-val" style={{color:'#92400e'}}>{fmtINR(m.pendAmt)}</div><div className="mc-sub">{m.pendCnt} pending{m.overCnt>0?' · '+m.overCnt+' overdue':''} — click to view</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        <div className="metric-card"><div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>GST Collected</div><div style={{fontFamily:'Syne',fontSize:20,fontWeight:700,color:'#5b21b6'}}>{fmtINR(m.gstOut)}</div><div style={{fontSize:11.5,color:'var(--text3)',marginTop:4}}>Output tax on sales</div></div>
        <div className="metric-card"><div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>GST Paid</div><div style={{fontFamily:'Syne',fontSize:20,fontWeight:700,color:'#5b21b6'}}>{fmtINR(m.gstIn)}</div><div style={{fontSize:11.5,color:'var(--text3)',marginTop:4}}>Input tax on purchases</div></div>
        <div className="metric-card"><div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Net GST Payable</div><div style={{fontFamily:'Syne',fontSize:20,fontWeight:700,color:m.gstNet>=0?'#9a3412':'#065f46'}}>{fmtINR(Math.abs(m.gstNet))}</div><div style={{fontSize:11.5,color:'var(--text3)',marginTop:4}}>{m.gstNet>=0?'Pay to Govt':'Input credit'}</div></div>
        <div className="metric-card"><div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Commission</div><div style={{fontFamily:'Syne',fontSize:20,fontWeight:700,color:'#9a3412'}}>{fmtINR(m.commInc)}</div><div style={{fontSize:11.5,color:'var(--text3)',marginTop:4}}>Received · {fmtINR(m.commExp)} paid out</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:14,marginBottom:18}}>
        <div className="card"><div className="card-header"><div><div className="card-title">Revenue vs Expenses</div><div className="card-sub">Last 6 months</div></div></div><div style={{padding:'16px 20px',height:220}}><BarChart data={barD}/></div></div>
        <div className="card"><div className="card-header"><div><div className="card-title">Expense breakdown</div><div className="card-sub">By category</div></div></div><div style={{padding:'16px 20px',height:220}}>{pieD.labels.length?<DChart data={pieD}/>:<div className="empty" style={{padding:40}}>No expense data</div>}</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
        <div className="card"><div className="card-header"><div><div className="card-title">Net cash flow</div><div className="card-sub">Monthly surplus / deficit trend</div></div></div><div style={{padding:'16px 20px',height:180}}><LineChart data={lineD}/></div></div>
        <div className="card">
          <div className="card-header"><div className="card-title">Pending payments</div></div>
          <div style={{padding:'8px 14px'}}>
            {txns.filter(t=>t.status==='Pending').length===0
              ?<div style={{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:13}}>✅ No pending payments</div>
              :txns.filter(t=>t.status==='Pending').sort((a,b)=>a.dueDate>b.dueDate?1:-1).slice(0,5).map(t=>{
                const ov=t.dueDate&&daysLeft(t.dueDate)<0;
                return<div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f1f5f9'}}>

                </div>;
              })}

      <div className="card">
        <div className="card-header"><div className="card-title">Recent transactions</div><span style={{fontSize:12,color:'var(--text3)'}}>Last 8 entries</span></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Vendor</th><th>Type</th><th>Category</th><th>Bill</th><th>Total</th><th>Status</th></tr></thead>

              <tr key={t.id} className={t.status==='Pending'&&t.dueDate&&daysLeft(t.dueDate)<0?'overdue':''}>

                <td><div style={{fontWeight:500,fontSize:13}}>{t.vendor}</div><div style={{fontSize:11,color:'var(--text3)'}}>{t.description?.substring(0,34)}</div></td>

                <td style={{fontSize:12.5}}>{t.category}</td>

              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══ TRANSACTIONS ═════════════════════════════ */
function Transactions({txns,imgs,user,onEdit,onDel,onDup,onAdd,initF}){
  const [search,ss]=useState('');
  const [ft,sft]=useState(initF?.type||'');
  const [fc,sfc]=useState('');
  const [fst,sfst]=useState(initF?.status||'');
  const [fp,sfp]=useState('');
  const [fg,sfg]=useState('');
  const [fd1,sd1]=useState('');
  const [fd2,sd2]=useState('');
  const [oo,soo]=useState(false);
  const [sb,ssb]=useState('date');
  const [sd,ssd]=useState('desc');
  const [pg,spg]=useState(1);
  const [viewImg,svi]=useState(null);
  const PG=25;

  const fil=useMemo(()=>{
    let a=[...txns];
    if(search)a=a.filter(t=>[t.vendor,t.description,t.referenceNo,t.id,t.vendorGstin].join(' ').toLowerCase().includes(search.toLowerCase()));
    if(ft)a=a.filter(t=>t.type===ft);
    if(fc)a=a.filter(t=>t.category===fc);
    if(fst)a=a.filter(t=>t.status===fst);
    if(fp)a=a.filter(t=>t.paymentMethod===fp);
    if(fg)a=a.filter(t=>t.gstType===fg);
    if(fd1)a=a.filter(t=>t.date>=fd1);
    if(fd2)a=a.filter(t=>t.date<=fd2);
    if(oo)a=a.filter(t=>t.status==='Pending'&&t.dueDate&&daysLeft(t.dueDate)<0);
    a.sort((a,b)=>{let va=a[sb],vb=b[sb];if(['amount','taxableAmount'].includes(sb)){va=Number(va);vb=Number(vb);}return sd==='asc'?(va>vb?1:-1):(va<vb?1:-1);});
    return a;
  },[txns,search,ft,fc,fst,fp,fg,fd1,fd2,oo,sb,sd]);

  const tots=useMemo(()=>({
    inc:fil.filter(t=>t.type==='Income'&&t.status!=='Cancelled').reduce((s,t)=>s+t.amount,0),
    exp:fil.filter(t=>t.type==='Expense'&&t.status!=='Cancelled').reduce((s,t)=>s+t.amount,0),
    gst:fil.filter(t=>t.status!=='Cancelled').reduce((s,t)=>s+t.gstAmount,0),
  }),[fil]);

  const pages=Math.ceil(fil.length/PG)||1;
  const paged=fil.slice((pg-1)*PG,pg*PG);
  const col=c=>{if(sb===c)ssd(d=>d==='asc'?'desc':'asc');else{ssb(c);ssd('desc');}spg(1);};
  const aw=c=>sb===c?(sd==='asc'?' ↑':' ↓'):'';
  const reset=()=>{ss('');sft('');sfc('');sfst('');sfp('');sfg('');sd1('');sd2('');soo(false);spg(1);};

  const exportX=()=>{
    const rows=fil.map(t=>({'ID':t.id,'Date':t.date,'Type':t.type,'Category':t.category,'Vendor':t.vendor,'GSTIN':t.vendorGstin,'Description':t.description,'Bill Type':t.gstType,'Taxable Amt ₹':t.taxableAmount,'GST Rate%':t.gstRate,'GST Amt ₹':t.gstAmount,'Total Amt ₹':t.amount,'Method':t.paymentMethod,'Reference No':t.referenceNo,'Status':t.status,'Due Date':t.dueDate,'Proof Link':t.proofLink,'Added By':t.addedBy,'Date Added':t.timestamp}));
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Transactions');
    XLSX.writeFile(wb,'WeFashion_Transactions_'+today()+'.xlsx');
  };

  return(
    <div>
      {viewImg&&(
        <div className="overlay" onClick={()=>svi(null)}>
          <div style={{background:'#fff',borderRadius:14,padding:16,maxWidth:580,width:'100%',maxHeight:'90vh',overflow:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontWeight:600,fontSize:14}}>Payment Proof</span><button className="btn btn-sm btn-outline" onClick={()=>svi(null)}>✕</button></div>
            <img src={viewImg} style={{width:'100%',borderRadius:8}} alt="proof"/>
          </div>
        </div>
      )}

      <div className="section-header">
        <div><div className="section-title">Transactions</div><div className="section-sub">{fil.length} record{fil.length!==1?'s':''}{fil.length!==txns.length?' (filtered from '+txns.length+')':''}</div></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-success" onClick={exportX}>⬇ Export Excel</button>
          {user&&<button className="btn btn-primary" onClick={onAdd}>+ Add Transaction</button>}
        </div>
      </div>

      <div className="card">
        <div className="filter-bar">
          <input type="search" placeholder="🔍  Search vendor, ID, GSTIN, reference..." value={search} onChange={e=>{ss(e.target.value);spg(1);}} style={{flex:1,minWidth:180}}/>
          <select value={ft} onChange={e=>{sft(e.target.value);spg(1);}}><option value="">All Types</option>{TYPES.map(t=><option key={t}>{t}</option>)}</select>
          <select value={fc} onChange={e=>{sfc(e.target.value);spg(1);}}><option value="">All Categories</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          <select value={fg} onChange={e=>{sfg(e.target.value);spg(1);}}><option value="">GST / Non-GST</option>{GST_TYPES.map(g=><option key={g}>{g}</option>)}</select>
          <select value={fst} onChange={e=>{sfst(e.target.value);spg(1);}}><option value="">All Status</option>{STATS.map(s=><option key={s}>{s}</option>)}</select>
          <select value={fp} onChange={e=>{sfp(e.target.value);spg(1);}}><option value="">All Methods</option>{PMETHODS.map(m=><option key={m}>{m}</option>)}</select>
          <input type="date" value={fd1} onChange={e=>{sd1(e.target.value);spg(1);}} style={{width:128}} title="From date"/>
          <input type="date" value={fd2} onChange={e=>{sd2(e.target.value);spg(1);}} style={{width:128}} title="To date"/>
          <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--text3)',cursor:'pointer',whiteSpace:'nowrap'}}>
            <input type="checkbox" checked={oo} onChange={e=>{soo(e.target.checked);spg(1);}}/> Overdue only
          </label>
          <button className="btn btn-ghost btn-sm" onClick={reset} title="Clear all filters">✕ Clear</button>
        </div>

        <div className="totals-strip">
          <span style={{fontSize:10.5,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em'}}>Filtered totals:</span>
          <div className="ts-item"><span className="ts-label">Income</span><span className="ts-val c-green">{fmtINR(tots.inc)}</span></div>
          <div className="ts-item"><span className="ts-label">Expense</span><span className="ts-val c-red">{fmtINR(tots.exp)}</span></div>
          <div className="ts-item"><span className="ts-label">Net</span><span className="ts-val" style={{color:(tots.inc-tots.exp)>=0?'#059669':'#dc2626'}}>{fmtINR(Math.abs(tots.inc-tots.exp))}</span></div>
          <div className="ts-item"><span className="ts-label">GST</span><span className="ts-val" style={{color:'#5b21b6'}}>{fmtINR(tots.gst)}</span></div>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--text3)'}}>Showing {paged.length} of {fil.length}</span>
        </div>

        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th className="sc" onClick={()=>col('date')}>Date{aw('date')}</th>
                <th>Type</th>
                <th className="sc" onClick={()=>col('vendor')}>Vendor / Party{aw('vendor')}</th>
                <th className="sc" onClick={()=>col('category')}>Category{aw('category')}</th>
                <th>Bill</th>
                <th className="sc" onClick={()=>col('taxableAmount')}>Taxable{aw('taxableAmount')}</th>
                <th>GST</th>
                <th className="sc" onClick={()=>col('amount')}>Total{aw('amount')}</th>
                <th>Method</th><th>Status</th><th>Due Date</th><th>Proof</th>
                {user&&<th>Actions</th>}
              </tr>
            </thead>
            <tbody>
              {paged.length===0
                ?<tr><td colSpan={user?14:13} style={{textAlign:'center',padding:44,color:'var(--text3)'}}>No transactions match the current filters.</td></tr>
                :paged.map(t=>{
                  const ov=t.status==='Pending'&&t.dueDate&&daysLeft(t.dueDate)<0;
                  const hasImg=imgs&&imgs[t.id];
                  return(
                    <tr key={t.id} className={ov?'overdue':''}>
                      <td style={{fontSize:10.5,color:'var(--text3)',fontFamily:'monospace',whiteSpace:'nowrap'}}>{t.id}</td>
                      <td style={{fontSize:12,whiteSpace:'nowrap',color:'var(--text3)'}}>{t.date}</td>
                      <td><TB t={t.type}/></td>
                      <td style={{maxWidth:180}}>
                        <div style={{fontWeight:500,fontSize:13}}>{t.vendor}</div>
                        {t.vendorGstin&&<div style={{fontSize:10,color:'var(--text3)',fontFamily:'monospace'}}>{t.vendorGstin}</div>}
                        {t.description&&<div style={{fontSize:11,color:'var(--text3)'}}>{t.description.substring(0,34)}{t.description.length>34?'…':''}</div>}
                      </td>
                      <td style={{fontSize:12.5}}>{t.category}</td>
                      <td><GB g={t.gstType}/></td>
                      <td style={{fontSize:13,fontFamily:'Syne',fontWeight:600}}>{fmtINR(t.taxableAmount)}</td>
                      <td>{t.gstAmount>0?<span style={{fontSize:11.5,color:'#5b21b6',fontWeight:500}}>+{fmtINR(t.gstAmount)}<br/><span style={{fontSize:10,fontWeight:400}}>@{t.gstRate}%</span></span>:<span style={{fontSize:12,color:'var(--text3)'}}>—</span>}</td>
                      <td style={{whiteSpace:'nowrap'}}><span className={t.type==='Income'?'c-green':t.type==='Expense'?'c-red':'c-purple'} style={{fontFamily:'Syne',fontSize:13}}>{fmtINR(t.amount)}</span></td>
                      <td style={{fontSize:12}}>{t.paymentMethod}</td>
                      <td><SB s={t.status}/>{ov&&<div style={{fontSize:10.5,color:'#991b1b',marginTop:2}}>⚠ Overdue</div>}</td>
                      <td><DueLabel d={t.dueDate} s={t.status}/></td>
                      <td>{hasImg?<button className="linka" onClick={()=>svi(imgs[t.id])}>📷 View</button>:t.proofLink?<a href={t.proofLink} target="_blank" rel="noreferrer" className="linka">View ↗</a>:<span style={{color:'var(--text3)',fontSize:12}}>—</span>}</td>
                      {user&&<td>
                        <div style={{display:'flex',gap:4}}>
                          <button className="btn btn-outline btn-xs" onClick={()=>onEdit(t)} title="Edit">✏</button>
                          <button className="btn btn-ghost btn-xs" onClick={()=>onDup(t)} title="Duplicate">⎘</button>
                          <button className="btn btn-danger btn-xs" onClick={()=>onDel(t.id)} title="Delete">🗑</button>
                        </div>
                      </td>}
                    </tr>
                  );
                })}
            </tbody>
          </table>
        </div>

        {pages>1&&<div className="pager">
          <span style={{fontSize:12,color:'var(--text3)',marginRight:8}}>Page {pg} of {pages}</span>
          <button className="pb" disabled={pg===1} onClick={()=>spg(1)}>«</button>
          <button className="pb" disabled={pg===1} onClick={()=>spg(p=>p-1)}>‹</button>
          {Array.from({length:pages},(_,i)=>i+1).filter(p=>Math.abs(p-pg)<=2).map(p=>(
            <button key={p} className={'pb '+(p===pg?'act':'')} onClick={()=>spg(p)}>{p}</button>
          ))}
          <button className="pb" disabled={pg===pages} onClick={()=>spg(p=>p+1)}>›</button>
          <button className="pb" disabled={pg===pages} onClick={()=>spg(pages)}>»</button>
        </div>}
      </div>
    </div>
  );
}

/* ══ REPORTS ══════════════════════════════════ */
function Reports({txns}){
  const [tab,st]=useState('pl');
  const [period,sp]=useState('month');
  const [selMonth,sm]=useState(today().substring(0,7));

  const filterTxns=useMemo(()=>{
    const now=new Date();
    if(period==='month')return txns.filter(t=>t.date.startsWith(selMonth)&&t.status!=='Cancelled');
    if(period==='quarter'){const q=Math.floor(now.getMonth()/3);const start=new Date(now.getFullYear(),q*3,1).toISOString().substring(0,7);const end=new Date(now.getFullYear(),q*3+3,0).toISOString().substring(0,7);return txns.filter(t=>t.date.substring(0,7)>=start&&t.date.substring(0,7)<=end&&t.status!=='Cancelled');}
    if(period==='year')return txns.filter(t=>t.date.startsWith(now.getFullYear().toString())&&t.status!=='Cancelled');
    return txns.filter(t=>t.status!=='Cancelled');
  },[txns,period,selMonth]);

  const pl=useMemo(()=>{
    const t=filterTxns;
    const revenue=t.filter(x=>x.type==='Income').reduce((s,x)=>s+x.taxableAmount,0);
    const cogs=t.filter(x=>x.type==='Expense'&&x.category==='Raw Material').reduce((s,x)=>s+x.taxableAmount,0);
    const grossProfit=revenue-cogs;
    const salary=t.filter(x=>x.type==='Expense'&&x.category==='Salary').reduce((s,x)=>s+x.taxableAmount,0);
    const rent=t.filter(x=>x.type==='Expense'&&x.category==='Rent').reduce((s,x)=>s+x.taxableAmount,0);
    const utilities=t.filter(x=>x.type==='Expense'&&x.category==='Utilities').reduce((s,x)=>s+x.taxableAmount,0);
    const transport=t.filter(x=>x.type==='Expense'&&x.category==='Transport').reduce((s,x)=>s+x.taxableAmount,0);
    const maint=t.filter(x=>x.type==='Expense'&&x.category==='Maintenance').reduce((s,x)=>s+x.taxableAmount,0);
    const commExp=t.filter(x=>x.type==='Expense'&&x.category==='Commission').reduce((s,x)=>s+x.taxableAmount,0);
    const other=t.filter(x=>x.type==='Expense'&&x.category==='Other').reduce((s,x)=>s+x.taxableAmount,0);
    const opExp=salary+rent+utilities+transport+maint+commExp+other;
    const opProfit=grossProfit-opExp;
    const tax=t.filter(x=>x.type==='Expense'&&x.category==='Tax').reduce((s,x)=>s+x.taxableAmount,0);
    const netProfit=opProfit-tax;
    const commInc=t.filter(x=>x.type==='Income'&&x.category==='Commission').reduce((s,x)=>s+x.taxableAmount,0);
    return{revenue,commInc,cogs,grossProfit,salary,rent,utilities,transport,maint,commExp,other,opExp,opProfit,tax,netProfit};
  },[filterTxns]);

  const gst=useMemo(()=>{
    const t=filterTxns;
    const rates=[5,12,18,28];
    const outByRate={};const inByRate={};
    rates.forEach(r=>{outByRate[r]=0;inByRate[r]=0;});
    t.filter(x=>x.gstType==='GST Bill'&&x.type==='Income').forEach(x=>{outByRate[x.gstRate]=(outByRate[x.gstRate]||0)+x.gstAmount;});
    t.filter(x=>x.gstType==='GST Bill'&&x.type==='Expense').forEach(x=>{inByRate[x.gstRate]=(inByRate[x.gstRate]||0)+x.gstAmount;});
    const totalOut=Object.values(outByRate).reduce((s,v)=>s+v,0);
    const totalIn=Object.values(inByRate).reduce((s,v)=>s+v,0);
    return{outByRate,inByRate,totalOut,totalIn,net:totalOut-totalIn};
  },[filterTxns]);

  const vendorRep=useMemo(()=>{
    const map={};
    filterTxns.forEach(t=>{
      if(!map[t.vendor])map[t.vendor]={name:t.vendor,gstin:t.vendorGstin||'',total:0,income:0,expense:0,count:0};
      map[t.vendor].total+=t.amount;
      if(t.type==='Income')map[t.vendor].income+=t.amount;
      else map[t.vendor].expense+=t.amount;
      map[t.vendor].count++;
    });
    return Object.values(map).sort((a,b)=>b.total-a.total);
  },[filterTxns]);

  const Row=({label,val,cls='',indent=false,subTotal=false,sectionHead=false,total=false})=>(
