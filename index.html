/* ══ PARTIES ══════════════════════════════════ */
function Parties({txns,user,onViewParty}){
  const parties=useMemo(()=>{
    const map={};
    txns.forEach(t=>{
      if(!map[t.vendor])map[t.vendor]={name:t.vendor,gstin:t.vendorGstin||'',total:0,income:0,expense:0,pending:0,count:0,lastDate:''};
      const p=map[t.vendor];
      p.count++;p.total+=t.amount;
      if(t.type==='Income')p.income+=t.amount;else p.expense+=t.amount;
      if(t.status==='Pending')p.pending+=t.amount;
      if(t.date>p.lastDate)p.lastDate=t.date;
    });
    return Object.values(map).sort((a,b)=>b.total-a.total);
  },[txns]);

  const colors=['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];
  const initials=name=>name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  if(!parties.length)return<div className="empty"><div className="empty-icon">🏢</div><h3>No parties yet</h3><p>Vendors and clients appear here after you add transactions.</p></div>;

  return(
    <div>
      <div className="section-header">
        <div><div className="section-title">Parties / Vendors</div><div className="section-sub">{parties.length} parties — click any party to see all their transactions</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
        {parties.map((p,i)=>(
          <div key={p.name} className="party-card" onClick={()=>onViewParty(p.name)}>
            <div className="party-av" style={{background:colors[i%colors.length]}}>{initials(p.name)}</div>
            <div className="party-info">
              <div className="party-name">{p.name}</div>
              {p.gstin&&<div style={{fontFamily:'monospace',fontSize:10.5,color:'var(--text3)'}}>{p.gstin}</div>}
              <div className="party-meta">{p.count} transaction{p.count!==1?'s':''} · Last: {p.lastDate}</div>
            </div>
            <div style={{textAlign:'right',flex:'none'}}>
              <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,color:p.income>p.expense?'#059669':'#dc2626'}}>{fmtINR(p.total)}</div>
              {p.pending>0&&<div style={{fontSize:11,color:'#92400e',marginTop:2}}>{fmtINR(p.pending)} pending</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══ SETTINGS ═════════════════════════════════ */
function Settings({txns,fbCfg,onFbSave,notify,onRestoreData,onDeleteAll}){
  const [cfg,scfg]=useState(()=>{try{return JSON.stringify(fbCfg||{},null,2);}catch{return '';}});
  const [cfgErr,sce]=useState('');
  const [creds,scr]=useState(loadCreds());
  const [nu,snu]=useState('');
  const [np,snp]=useState('');
  const [cp,scp]=useState('');
  const [credMsg,scm]=useState('');
  const [showC,ssc]=useState(false);
  const [delConf,sdc]=useState(false);
  const fileRef=useRef();

  const saveFB=()=>{
    try{
      const parsed=JSON.parse(cfg);
      if(!parsed.databaseURL)throw new Error('Missing databaseURL in config');
      onFbSave(parsed);
      sce('');
      notify('Firebase config saved — connecting...','success');
    }catch(e){sce('Invalid config: '+e.message);}
  };

  const saveCred=()=>{
    if(!nu.trim()&&!np){scm('Enter a new username or password.');return;}
    if(np&&np!==cp){scm('Passwords do not match.');return;}
    if(np&&np.length<8){scm('Password must be at least 8 characters.');return;}
    const updated={u:nu.trim()||creds.u,p:np||creds.p};
    saveCreds(updated);scr(updated);snu('');snp('');scp('');scm('');
    notify('Login credentials updated ✓');
  };

  const exportBackup=()=>{
    const blob=new Blob([JSON.stringify({version:'wf-v3',exportedAt:new Date().toISOString(),company:'WeFashion',transactions:txns},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='WeFashion_Backup_'+today()+'.json';a.click();
    notify('Backup downloaded ✓');
  };

  const importBackup=e=>{
    const file=e.target.files[0];if(!file)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.transactions||!Array.isArray(d.transactions))throw new Error('Invalid backup file');
        if(!window.confirm('Import '+d.transactions.length+' transactions? This will replace all current data.'))return;
        onRestoreData(d.transactions);
        notify('Restored '+d.transactions.length+' transactions ✓');
      }catch{notify('Invalid backup file — could not restore','error');}
    };
    rd.readAsText(file);
    e.target.value='';
  };

  return(
    <div>
      <div className="section-title">Settings</div>
      <div className="section-sub">Configure database, manage admin access, and backup your data.</div>

      {/* Firebase */}
      <div className="fb-setup">
        <h3>🔥 Firebase Setup — Real-Time Sync</h3>
        <p style={{fontSize:13,color:'#3730a3',marginBottom:14,lineHeight:1.55}}>Firebase syncs data across all devices instantly. Free forever for small companies. Setup takes 5 minutes.</p>
        <div className="fb-step"><div className="fb-step-num">1</div><div>Go to <strong>console.firebase.google.com</strong> → Create project → name it <code className="pill">wefashion-finance</code> → continue (no Analytics needed)</div></div>
        <div className="fb-step"><div className="fb-step-num">2</div><div>In the project → click <code className="pill">&lt;/&gt; Web</code> app → register app → copy the <code className="pill">firebaseConfig</code> object shown</div></div>
        <div className="fb-step"><div className="fb-step-num">3</div><div>Go to <strong>Build → Realtime Database</strong> → Create database → Start in test mode → Done</div></div>
        <div className="fb-step"><div className="fb-step-num">4</div><div>Paste the config JSON below and click Save. Your data will sync to all devices in real-time from that moment.</div></div>
        <div className="fg" style={{marginBottom:10}}>
          <label>Firebase Config (paste the firebaseConfig object here)</label>
          <textarea value={cfg} onChange={e=>scfg(e.target.value)} style={{fontFamily:'monospace',fontSize:12,minHeight:140,borderColor:cfgErr?'#fca5a5':'var(--border)'}} placeholder={'{\n  "apiKey": "AIza...",\n  "authDomain": "project.firebaseapp.com",\n  "databaseURL": "https://project-default-rtdb.firebaseio.com",\n  "projectId": "project-id",\n  ...\n}'}/>
          {cfgErr&&<span className="err">{cfgErr}</span>}
        </div>
        <button className="btn btn-primary" onClick={saveFB}>Save & Connect Firebase</button>
        {fbCfg?.databaseURL&&<span className="badge b-green" style={{marginLeft:10}}>✓ Connected: {fbCfg.databaseURL.split('//')[1]?.split('.')[0]}</span>}
        <div className="info-box" style={{marginTop:10}}>✅ Once connected: every Add / Edit / Delete by admin pushes to Firebase. All viewers see live data. Changes appear on every device within 1 second — no refresh needed.</div>
      </div>

      {/* Credentials */}
      <div className="ss">
        <div className="ss-title">🔐 Admin Credentials</div>
        <div className="ss-sub">Only the admin can see this page. Change your login details below.</div>
        <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.04em'}}>Current credentials</span>
            <button className="btn btn-ghost btn-xs" onClick={()=>ssc(!showC)}>{showC?'🙈 Hide':'👁 Reveal'}</button>
          </div>
          <div style={{fontSize:13,marginBottom:5}}><span style={{color:'var(--text3)',marginRight:8}}>Username:</span>{showC?<strong style={{fontFamily:'monospace'}}>{creds.u}</strong>:<span style={{fontFamily:'monospace',letterSpacing:'.2em',color:'var(--text3)'}}>{'•'.repeat(creds.u.length)}</span>}</div>
          <div style={{fontSize:13}}><span style={{color:'var(--text3)',marginRight:8}}>Password:</span>{showC?<strong style={{fontFamily:'monospace'}}>{creds.p}</strong>:<span style={{fontFamily:'monospace',letterSpacing:'.2em',color:'var(--text3)'}}>{'•'.repeat(creds.p.length)}</span>}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11,marginBottom:11}}>
          <div className="fg"><label>New Username</label><input value={nu} onChange={e=>snu(e.target.value)} placeholder={'Current: '+creds.u}/></div>
          <div></div>
          <div className="fg"><label>New Password</label><input type="password" value={np} onChange={e=>snp(e.target.value)} placeholder="Min 8 characters"/></div>
          <div className="fg"><label>Confirm New Password</label><input type="password" value={cp} onChange={e=>scp(e.target.value)} placeholder="Re-enter password"/></div>
        </div>
        {credMsg&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'7px 11px',borderRadius:7,fontSize:13,marginBottom:10}}>{credMsg}</div>}
        <button className="btn btn-primary" onClick={saveCred}>Update Credentials</button>
      </div>

      {/* Backup */}
      <div className="ss">
        <div className="ss-title">💾 Backup & Restore</div>
        <div className="ss-sub">Download a JSON backup anytime. Restore from backup on any device. Use alongside Firebase for extra safety.</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
          <button className="btn btn-primary" onClick={exportBackup}>⬇ Download Backup ({txns.length} records)</button>
          <button className="btn btn-outline" onClick={()=>fileRef.current.click()}>⬆ Restore from Backup</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importBackup}/>
        </div>
        <div className="info-box">💡 Backup gives you a local copy. If Firebase is configured, restoring from backup also pushes data to Firebase — all devices update automatically.</div>
      </div>

      {/* Danger */}
      <div className="ss" style={{borderColor:'#fecaca'}}>
        <div className="ss-title" style={{color:'#991b1b'}}>⚠ Danger Zone</div>
        <div className="ss-sub">Permanently delete all transaction records. Cannot be undone. Download a backup first.</div>
        {!delConf
          ?<button className="btn btn-danger" onClick={()=>sdc(true)}>Delete All Records</button>
          :<div style={{background:'#fee2e2',border:'1px solid #fecaca',borderRadius:10,padding:14}}>
            <div style={{fontSize:13,fontWeight:500,color:'#991b1b',marginBottom:10}}>Type <strong>DELETE</strong> to confirm permanent deletion:</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input id="del_input" placeholder="Type DELETE" style={{padding:'8px 12px',border:'1.5px solid #fca5a5',borderRadius:8,fontSize:13,fontFamily:'monospace',width:140}}/>
              <button className="btn btn-danger" onClick={()=>{if(document.getElementById('del_input').value==='DELETE'){onDeleteAll();sdc(false);}else notify('Type DELETE exactly to confirm','error');}}>Confirm Delete</button>
              <button className="btn btn-outline" onClick={()=>sdc(false)}>Cancel</button>
            </div>
          </div>}
      </div>
    </div>
  );
}

/* ══ APP ══════════════════════════════════════ */
function App(){
  const [user,su]=useState(null);
  const [view,sv]=useState('dashboard');
  const [txFilter,stf]=useState({});
  const [partyFilter,spf]=useState(null);
  const [txns,st]=useState(loadCache);
  const [imgs,si]=useState(loadImgs);
  const [fbCfg,sfc]=useState(loadFBCfg);
  const [syncSt,sss]=useState('idle');
  const [lastSync,sls]=useState('');
  const [toasts,sto]=useState([]);
  const [modal,sm]=useState(false);
  const [editing,se]=useState(null);
  const [delId,sdel]=useState(null);
  const [showLogin,ssl]=useState(false);
  const [sideOpen,sso]=useState(false);
  const [overCnt,soc]=useState(0);
  const unsubRef=useRef(null);

  const notify=useCallback((msg,type='success')=>{
    const id=Date.now();
    sto(p=>[...p,{id,msg,type}]);
    setTimeout(()=>sto(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  /* Firebase */
  const connectFB=useCallback((cfg)=>{
    if(unsubRef.current){unsubRef.current();unsubRef.current=null;}
    if(!cfg||!cfg.databaseURL){sss('idle');return;}
    sss('syncing');
    const ok=initFB(cfg);
    if(!ok){sss('error');return;}
    const unsub=fbListen(data=>{
      st(data);saveCache(data);
      sss('synced');
      sls(new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    });
    if(unsub)unsubRef.current=unsub;
    else sss('error');
  },[]);

  useEffect(()=>{
    if(fbCfg?.databaseURL)connectFB(fbCfg);
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[]);

  useEffect(()=>{
    const oc=txns.filter(t=>t.status==='Pending'&&t.dueDate&&daysLeft(t.dueDate)<0).length;
    soc(oc);
  },[txns]);

  const pushFB=useCallback(async(data)=>{
    if(!fbDb){saveCache(data);return;}
    sss('syncing');
    const ok=await fbWrite(data);
    if(ok){sss('synced');sls(new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));}
    else{sss('error');notify('Firebase sync failed — saved locally','warn');}
  },[notify]);

  const handleSave=async(tx,imgData)=>{
    let newTxns;
    if(editing?.id){
      newTxns=txns.map(t=>t.id===editing.id?{...tx,id:editing.id,addedBy:editing.addedBy,timestamp:editing.timestamp}:t);
    } else {
      newTxns=[{...tx,id:genId(),addedBy:user.username,timestamp:new Date().toISOString()},...txns];
    }
    const txId=editing?.id||newTxns[0]?.id;
    const newImgs={...loadImgs()};
    if(imgData&&txId)newImgs[txId]=imgData;
    else if(!imgData&&txId&&newImgs[txId])delete newImgs[txId];
    si(newImgs);saveImgs(newImgs);
    await pushFB(newTxns);
    notify(editing?'Transaction updated ✓':'Transaction added ✓');
    sm(false);se(null);
  };

  const openAdd=()=>{se(null);sm(true);sso(false);};
  const openEdit=tx=>{se(tx);sm(true);};
  const openDup=tx=>{se({...tx,id:null,date:today(),status:'Pending',referenceNo:'',proofLink:'',timestamp:null});sm(true);notify('Duplicated — update details before saving','warn');};

  const handleDel=async id=>{
    const newTxns=txns.filter(t=>t.id!==id);
    const newImgs={...loadImgs()};delete newImgs[id];
    si(newImgs);saveImgs(newImgs);
    sdel(null);await pushFB(newTxns);
    notify('Transaction deleted','error');
  };

  const handleRestore=async data=>{
    await pushFB(data);
    notify('Restored '+data.length+' transactions ✓');
  };

  const handleDeleteAll=async()=>{
    await pushFB([]);
    si({});saveImgs({});
    notify('All records deleted','error');
  };

  const handleFbSave=cfg=>{
    sfc(cfg);saveFBCfg(cfg);connectFB(cfg);
  };

  const nowStr=new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const syncLabel={idle:'Not configured',synced:'Live · '+lastSync,syncing:'Syncing...',error:'Sync error'};
  const syncDot={idle:'sdot-idle',synced:'sdot-ok',syncing:'sdot-sync',error:'sdot-err'};

  const pageTitle={dashboard:'Dashboard',transactions:'Transactions',reports:'Reports',parties:'Parties',settings:'Settings'};

  const navItems=[
    {k:'dashboard',l:'Dashboard',badge:overCnt>0?overCnt:0,icon:<svg className="ni" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>},
    {k:'transactions',l:'Transactions',icon:<svg className="ni" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>},
    {k:'reports',l:'Reports',icon:<svg className="ni" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>},
    {k:'parties',l:'Parties',icon:<svg className="ni" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>},
  ];

  return(
    <>
      {showLogin&&!user&&(
        <div style={{position:'fixed',inset:0,zIndex:400}}>
          <Login onLogin={u=>{su({username:u});ssl(false);notify('Welcome back, '+u+' ✓');}}/>
          <button onClick={()=>ssl(false)} style={{position:'fixed',top:20,right:20,background:'rgba(255,255,255,.15)',border:'none',color:'#fff',cursor:'pointer',borderRadius:9,padding:'7px 14px',fontSize:13,fontFamily:'Inter'}}>✕ Continue as viewer</button>
        </div>
      )}

      <div className={'ovl '+(sideOpen?'open':'')} onClick={()=>sso(false)}/>

      <div className={'sidebar '+(sideOpen?'open':'')}>
        <div className="logo-wrap">
          <div className="logo-inner">
            <div className="logo-box">WF</div>
            <div><div className="logo-name">WeFashion</div><div className="logo-tag">Finance Manager</div></div>
          </div>
        </div>

        <div className="snav">
          <div className="nav-group-label">Main</div>
          {navItems.map(n=>(
            <button key={n.k} className={'nav-item '+(view===n.k?'active':'')} onClick={()=>{stf({});spf(null);sv(n.k);sso(false);}}>
              {n.icon}{n.l}
              {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
            </button>
          ))}

          {user&&<>
            <div className="nav-group-label" style={{marginTop:8}}>Admin</div>
            <button className="nav-item" onClick={()=>{openAdd();}}>
              <svg className="ni" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>Add Transaction
            </button>
            <button className={'nav-item '+(view==='settings'?'active':'')} onClick={()=>{sv('settings');sso(false);}}>
              <svg className="ni" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              Settings
            </button>
          </>}
        </div>

        <div className="sidebar-foot">
          {user?(
            <div>
              <div className="user-pill">
                <div className="user-av">{user.username[0].toUpperCase()}</div>
                <div className="user-info"><div className="user-name">{user.username}</div><div className="user-role">Administrator</div></div>
              </div>
              <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:7,color:'rgba(255,255,255,.4)',fontSize:12}} onClick={()=>{su(null);sv('dashboard');notify('Logged out');}}>Logout</button>
            </div>
          ):(
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'10px 0'}} onClick={()=>ssl(true)}>
              <svg className="ni" viewBox="0 0 24 24" style={{width:14,height:14}}><path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
              Admin Login
            </button>
          )}
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <button className="hamburger" onClick={()=>sso(o=>!o)} aria-label="Menu">
              <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div>
              <div className="page-title">{pageTitle[view]||'WeFashion'}</div>
              <div className="page-sub">{nowStr}</div>
            </div>
          </div>
          <div className="topbar-right">
            <div className="sync-chip" onClick={()=>{if(fbCfg?.databaseURL)connectFB(fbCfg);else{sv('settings');if(user){}else ssl(true);}}}>
              <span className={'sdot '+syncDot[syncSt]}></span>
              <span>{syncLabel[syncSt]}</span>
            </div>
            <span style={{fontSize:12,color:'var(--text3)',marginLeft:4}}>{txns.length} records</span>
            {user
              ?<span className="badge b-indigo">● Admin</span>
              :<span className="badge b-gray">● Viewer</span>}
          </div>
        </div>

        <div className="content">
          {view==='dashboard'&&<Dashboard txns={txns} user={user} onAdd={openAdd} onViewPending={()=>{stf({status:'Pending'});sv('transactions');}} notify={notify}/>}
          {view==='transactions'&&<Transactions txns={txns} imgs={imgs} user={user} onEdit={openEdit} onDel={id=>sdel(id)} onDup={openDup} onAdd={openAdd} initF={txFilter}/>}
          {view==='reports'&&<Reports txns={txns}/>}
          {view==='parties'&&<Parties txns={txns} user={user} onViewParty={name=>{stf({vendor:name});sv('transactions');}}/>}
          {view==='settings'&&user&&<Settings txns={txns} fbCfg={fbCfg} onFbSave={handleFbSave} notify={notify} onRestoreData={handleRestore} onDeleteAll={handleDeleteAll}/>}
          {view==='settings'&&!user&&<div className="empty"><div className="empty-icon">🔒</div><h3>Admin access required</h3><p>Login as admin to access settings and configure Firebase.</p><button className="btn btn-primary" onClick={()=>ssl(true)}>Admin Login</button></div>}
        </div>
      </div>

      {modal&&<TxModal tx={editing} onSave={handleSave} onClose={()=>{sm(false);se(null);}}/>}

      {delId&&<div className="overlay">
        <div className="confirm-card">
          <h4>Delete this transaction?</h4>
          <p>This will permanently remove the record from this app and from Firebase. This action cannot be undone.</p>
          <div className="confirm-acts">
            <button className="btn btn-outline" onClick={()=>sdel(null)}>Cancel</button>
            <button className="btn btn-danger" onClick={()=>handleDel(delId)}>Yes, Delete</button>
          </div>
        </div>
      </div>}

      <ToastManager toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
